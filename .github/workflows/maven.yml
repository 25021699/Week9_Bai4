name: Multi-OS Testing (Matrix)
on: [push]

jobs:
  build:
    strategy:
      matrix:
        # Chạy đồng thời trên cả 3 hệ điều hành
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Test
        run: mvn clean test