name: Java CI with Maven

# 1. Kích hoạt khi có sự kiện push hoặc pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Thực thi vòng đời build của Maven (test và package)
      - name: Run Maven Test and Package
        run: mvn clean package

      # 3. Triển khai upload-artifact để lưu giữ file .jar
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v3
        # Chạy action này bất kể bước trên thành công hay thất bại (để phục vụ việc test lỗi)
        if: always()
        with:
          name: math-utils-jar
          path: target/*.jar